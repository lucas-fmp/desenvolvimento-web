<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Saúde</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        .login-container h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
        }

        .login-container p {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h1>Login - Sistema de Saúde</h1>
        <p>Acesso ao sistema do hospital</p>

        <form id="loginForm">

            <div class="form-group">
                <label for="matricula">Matrícula:</label>
                <input type="text" id="matricula" name="matricula" placeholder="Digite sua matrícula médica">
            </div>

            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
            </div>

            <div class="form-group">
                <label for="cargo">Cargo:</label>
                <select id="cargo" name="cargo">
                    <option value="">Selecione o seu cargo...</option>
                    <option value="Médico(a)">Médico(a)</option>
                    <option value="Enfermeiro(a)">Enfermeiro(a)</option>
                    <option value="Recepcionista">Recepcionista</option>
                    <option value="Administrador(a)">Administrador(a)</option>
                </select>
            </div>

            <button type="submit">Entrar no Sistema</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {

            event.preventDefault();

            const matricula = document.getElementById('matricula').value;
            const senha = document.getElementById('senha').value;
            const cargo = document.getElementById('cargo').value;

            if (matricula !== '' && senha !== '' && cargo !== '') {
                alert('Bem-vindo ao Sistema de Saúde!\n\nMatrícula: ' + matricula + '\nCargo: ' + cargo);
            } else {
                alert('Atenção: Por favor, preencha todos os campos obrigatórios (Matrícula, Senha e Cargo) para acessar o sistema!');
            }
        });
    </script>

</body>

</html>
