<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões e Alertas - Aula 6</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="botao_A" class="botao">Botão A</button>
    <button id="botao_B" class="botao">Botão B</button>
    <button id="botao_C" class="botao">Botão C</button>

    <script>
        document.getElementById("botao_A").onclick = function () {
            alert("Botão A clicado");
        }
        document.getElementById("botao_B").onclick = function () {
            alert("Botão B clicado");
        }
        document.getElementById("botao_C").onclick = function () {
            alert("Botão C clicado");
        }
    </script>
</body>

</html>
